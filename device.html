<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AK Ultra - تفاصيل الجهاز</title>
    
    <!-- Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --secondary: #7c3aed;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            
            --background: var(--gray-50);
            --surface: #ffffff;
            --surface-hover: var(--gray-100);
            
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-700);
            --text-muted: var(--gray-500);
            
            --border-light: var(--gray-200);
            --border-color: var(--gray-300);
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 9999px;
            
            --font-size-xs: 0.75rem;
            --font-size-sm: 0.875rem;
            --font-size-base: 1rem;
            --font-size-lg: 1.125rem;
            --font-size-xl: 1.375rem;
            --font-size-2xl: 1.75rem;
        }

        [data-theme="dark"] {
            --background: var(--gray-900);
            --surface: var(--gray-800);
            --surface-hover: var(--gray-700);
            --text-primary: var(--gray-50);
            --text-secondary: var(--gray-300);
            --text-muted: var(--gray-400);
            --border-light: var(--gray-700);
            --border-color: var(--gray-600);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            transition: background-color var(--transition-base);
            font-size: var(--font-size-sm);
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .page-header {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-info h1 {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .header-info .device-code {
            font-size: var(--font-size-sm);
            color: var(--text-muted);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            background: var(--surface-hover);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all var(--transition-fast);
        }

        .back-btn:hover {
            background: var(--border-light);
            transform: translateX(-4px);
        }

        /* Cards */
        .card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-light);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .card-title {
            font-size: var(--font-size-lg);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-title i {
            color: var(--primary);
            font-size: 1.25rem;
        }

        /* Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .info-item {
            background: var(--surface-hover);
            padding: 1rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
        }

        .info-label {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-value {
            font-size: var(--font-size-base);
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-word;
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 1rem;
            border-radius: var(--radius-full);
            font-size: var(--font-size-sm);
            font-weight: 500;
        }

        .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .badge-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .badge-info { background: rgba(59, 130, 246, 0.1); color: var(--info); }
        .badge-primary { background: rgba(37, 99, 235, 0.1); color: var(--primary); }
        .badge-secondary { background: rgba(100, 116, 139, 0.1); color: var(--text-secondary); }

        /* Workflow Progress */
        .workflow-progress {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1rem 0;
            padding: 0.75rem 0;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .workflow-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            flex: 1;
            text-align: center;
        }

        .workflow-stage.active {
            color: var(--primary);
            font-weight: 600;
        }

        .workflow-stage.completed {
            color: var(--success);
        }

        .workflow-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-light);
            transition: all var(--transition-fast);
        }

        .workflow-stage.active .workflow-dot {
            background: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .workflow-stage.completed .workflow-dot {
            background: var(--success);
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-right: 2rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .timeline::before {
            content: '';
            position: absolute;
            right: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-light);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 1.25rem;
        }

        .timeline-dot {
            position: absolute;
            right: -1.5rem;
            width: 14px;
            height: 14px;
            border-radius: var(--radius-full);
            background: var(--surface);
            border: 3px solid var(--primary);
            z-index: 1;
        }

        .timeline-content {
            background: var(--surface-hover);
            padding: 0.875rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
        }

        .timeline-time {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .timeline-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        /* Notes Section */
        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .note-item {
            background: var(--surface-hover);
            padding: 1rem;
            border-radius: var(--radius-lg);
            border-right: 3px solid var(--primary);
        }

        .note-time {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .note-text {
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Loading & Error */
        .loading-container, .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 1.5rem;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: var(--font-size-sm);
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: 'Cairo', sans-serif;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--surface-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
        }

        .btn-secondary:hover {
            background: var(--border-light);
        }

        /* Share Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: var(--font-size-lg);
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: var(--radius-full);
        }

        .modal-close:hover {
            background: var(--surface-hover);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .share-link {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .share-link input {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            background: var(--surface);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
        }

        .qr-container {
            text-align: center;
            margin: 1rem 0;
            padding: 1rem;
            background: white;
            border-radius: var(--radius-lg);
            display: inline-block;
            width: 100%;
        }

        #qrCode {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            min-width: 280px;
            padding: 12px 20px;
            background: var(--surface);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border-right: 4px solid var(--primary);
            animation: toastSlideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast.success { border-right-color: var(--success); }
        .toast.error { border-right-color: var(--danger); }

        @keyframes toastSlideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
            .workflow-progress {
                flex-direction: column;
                align-items: stretch;
            }
            .workflow-stage {
                flex-direction: row;
                justify-content: space-between;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <!-- Header -->
        <div class="page-header">
            <div class="header-info">
                <h1 id="deviceTitle">جاري التحميل...</h1>
                <div class="device-code" id="deviceCode"></div>
            </div>
            <div style="display: flex; gap: 0.75rem;">
                <button class="back-btn" onclick="window.location.href='index.html'">
                    <i class="fas fa-arrow-right"></i>
                    <span>العودة للوحة</span>
                </button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading-container">
            <div class="loading-spinner"></div>
            <p>جاري الاستعلام عن بيانات الجهاز...</p>
        </div>

        

        <!-- Content -->
        <div id="contentState" style="display: none;">
            <!-- Status Card -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-chart-simple"></i>
                    <span>الحالة الحالية</span>
                </div>
                <div id="statusBadge" style="margin-bottom: 1rem;"></div>
                <div id="workflowProgress"></div>
            </div>

            <!-- Device Info Card -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-info-circle"></i>
                    <span>معلومات الجهاز</span>
                </div>
                <div class="info-grid" id="deviceInfo"></div>
            </div>

            <!-- Problem & Notes Card -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>تفاصيل العطل</span>
                </div>
                <div id="problemSection"></div>
            </div>

            <!-- Notes Card -->
            <div class="card">
                
                <div id="problemSection"></div>
            </div>

            

            <!-- Action Buttons -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-share-alt"></i>
                    <span>مشاركة الجهاز</span>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="openShareModal()">
                        <i class="fas fa-share-alt"></i>
                        مشاركة الرابط
                    </button>
                    <button class="btn btn-secondary" onclick="copyLink()">
                        <i class="fas fa-copy"></i>
                        نسخ الرابط
                    </button>
                    <button class="btn btn-secondary" onclick="window.print()">
                        <i class="fas fa-print"></i>
                        طباعة
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="modal" id="shareModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">مشاركة الجهاز</h3>
                <button class="modal-close" onclick="closeShareModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <p>يمكنك مشاركة هذا الرابط مع العملاء أو الفنيين:</p>
                <div class="share-link">
                    <input type="text" id="shareLinkInput" readonly>
                    <button class="btn btn-primary" onclick="copyShareLink()">نسخ</button>
                </div>
                <div class="qr-container">
                    <div id="qrCode"></div>
                    <p class="text-small" style="margin-top: 0.5rem;">امسح الكود لفتح صفحة الجهاز</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzoTX3YVK9j3vZefenjiypIW_B2dcQrKKkvsnCFcgO9XuzwrPL3mDriz0wIgFySBEM1/exec',
            WORKFLOW_STAGES: ['received', 'diagnosing', 'repairing', 'testing', 'ready', 'delivered']
        };

        // ============================================
        // STATE
        // ============================================
        let deviceData = null;

        // ============================================
        // UTILITIES
        // ============================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = document.createElement('i');
            icon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            const text = document.createElement('span');
            text.textContent = message;
            toast.appendChild(icon);
            toast.appendChild(text);
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'toastSlideIn 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function formatDate(dateString) {
            if (!dateString) return 'غير محدد';
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-EG', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getStatusText(status) {
            const statusMap = {
                'received': 'مستلم',
                'diagnosing': 'تشخيص',
                'repairing': 'إصلاح',
                'testing': 'اختبار',
                'ready': 'جاهز',
                'in_progress': 'قيد الصيانة',
                'delivered': 'تم التسليم',
                'rejected': 'مرفوض'
            };
            return statusMap[status] || status || 'غير محدد';
        }

        function getStatusBadgeClass(status) {
            const classMap = {
                'received': 'info',
                'diagnosing': 'warning',
                'repairing': 'primary',
                'testing': 'info',
                'ready': 'success',
                'in_progress': 'warning',
                'delivered': 'success',
                'rejected': 'danger'
            };
            return classMap[status] || 'secondary';
        }

        // ============================================
        // WORKFLOW
        // ============================================
        function getStageIndex(status) {
            return CONFIG.WORKFLOW_STAGES.indexOf(status);
        }

        function getStageName(stage) {
            const names = {
                'received': 'مستلم',
                'diagnosing': 'تشخيص',
                'repairing': 'إصلاح',
                'testing': 'اختبار',
                'ready': 'جاهز',
                'delivered': 'مسلم'
            };
            return names[stage] || stage;
        }

        function renderWorkflowProgress(device) {
            const status = device.status || 'received';
            const currentIndex = getStageIndex(status);
            if (currentIndex === -1) return '';

            return `
                <div class="workflow-progress">
                    ${CONFIG.WORKFLOW_STAGES.map((stage, index) => `
                        <div class="workflow-stage ${index === currentIndex ? 'active' : ''} ${index < currentIndex ? 'completed' : ''}">
                            <div class="workflow-dot"></div>
                            <span>${getStageName(stage)}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ============================================
        // RENDER FUNCTIONS
        // ============================================
        function renderDeviceInfo(device) {
            const html = `
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-user"></i> اسم العميل</div>
                    <div class="info-value">${device.customer_name || 'غير محدد'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-phone"></i> رقم الهاتف</div>
                    <div class="info-value">${device.customer_phone || 'غير محدد'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-envelope"></i> البريد الإلكتروني</div>
                    <div class="info-value">${device.customer_email || 'غير محدد'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-mobile-alt"></i> نوع الجهاز</div>
                    <div class="info-value">${device.device_name || 'غير محدد'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-barcode"></i> كود الجهاز</div>
                    <div class="info-value">${device.repair_number || device.device_code || 'غير محدد'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-microchip"></i> IMEI</div>
                    <div class="info-value">${device.imei || 'غير محدد'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-user-cog"></i> الفني المسؤول</div>
                    <div class="info-value">${device.opened_by || 'غير محدد'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-calendar-alt"></i> تاريخ الاستلام</div>
                    <div class="info-value">${formatDate(device.date_created)}</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-clock"></i> آخر تحديث</div>
                    <div class="info-value">${formatDate(device.last_update)}</div>
                </div>
                ${device.price ? `
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-coins"></i> السعر</div>
                        <div class="info-value">${device.price} جنيه</div>
                    </div>
                ` : ''}
                ${device.delivered_by ? `
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-user-check"></i> تم التسليم بواسطة</div>
                        <div class="info-value">${device.delivered_by}</div>
                    </div>
                ` : ''}
            `;
            document.getElementById('deviceInfo').innerHTML = html;
        }

        function renderProblemSection(device) {
            let html = `
                <div class="info-item" style="margin-bottom: 1rem;">
                    <div class="info-label"><i class="fas fa-exclamation-circle"></i> المشكلة</div>
                    <div class="info-value">${device.problem || 'غير محدد'}</div>
                </div>
            `;
            if (device.problem_solved) {
                html += `
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-check-circle"></i> الحل</div>
                        <div class="info-value">${device.problem_solved}</div>
                    </div>
                `;
            }
            document.getElementById('problemSection').innerHTML = html;
        }

        function renderNotes(device) {
            const notes = device.notes || '';
            if (!notes) {
                document.getElementById('notesSection').innerHTML = '<p class="text-small">لا توجد ملاحظات</p>';
                return;
            }
            
            const notesArray = notes.split('\n').filter(n => n.trim());
            const html = `
                <div class="notes-list">
                    ${notesArray.map(note => `
                        <div class="note-item">
                            <div class="note-time">${formatDate(new Date())}</div>
                            <div class="note-text">${note}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('notesSection').innerHTML = html;
        }

        function renderTimeline(device) {
            const timeline = device.timeline || [];
            if (!timeline.length) {
                document.getElementById('timelineSection').innerHTML = '<p class="text-small">لا توجد أحداث مسجلة في سجل الصيانة</p>';
                return;
            }

            const html = `
                <div class="timeline">
                    ${timeline.map(entry => `
                        <div class="timeline-item">
                            <div class="timeline-dot"></div>
                            <div class="timeline-content">
                                <div class="timeline-time">${formatDate(entry.timestamp)}</div>
                                <div class="timeline-title">${entry.status}</div>
                                <div>${entry.note || ''}</div>
                                <div class="text-small">بواسطة: ${entry.performed_by || 'النظام'}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('timelineSection').innerHTML = html;
        }

        function updatePageTitle(device) {
            document.title = `${device.customer_name || 'جهاز'} - ${device.device_name || ''} | AK Ultra`;
            document.getElementById('deviceTitle').textContent = device.customer_name || 'جهاز غير معروف';
            document.getElementById('deviceCode').textContent = device.repair_number || device.device_code || '';
            
            const statusBadge = document.getElementById('statusBadge');
            statusBadge.innerHTML = `
                <span class="badge badge-${getStatusBadgeClass(device.status)}" style="font-size: 1rem; padding: 0.5rem 1rem;">
                    <i class="fas fa-${device.status === 'delivered' ? 'check-circle' : 'cog'}"></i>
                    ${getStatusText(device.status)}
                </span>
            `;
            
            document.getElementById('workflowProgress').innerHTML = renderWorkflowProgress(device);
        }

        function renderAll(device) {
            updatePageTitle(device);
            renderDeviceInfo(device);
            renderProblemSection(device);
            renderNotes(device);
            renderTimeline(device);
        }

        // ============================================
        // API CALLS
        // ============================================
        async function fetchDevice(deviceId) {
            try {
                const formData = new FormData();
                formData.append('action', 'GET_DEVICES');
                formData.append('payload', JSON.stringify({}));

                const response = await fetch(CONFIG.APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('فشل الاتصال بالخادم');
                }

                const data = await response.json();
                
                if (data.success && data.data) {
                    const device = data.data.find(d => d.id === deviceId);
                    if (device) {
                        return device;
                    }
                }
                
                return null;
            } catch (error) {
                console.error('Error fetching device:', error);
                throw error;
            }
        }

        // ============================================
        // SHARE FUNCTIONS
        // ============================================
        function openShareModal() {
            const currentUrl = window.location.href;
            document.getElementById('shareLinkInput').value = currentUrl;
            document.getElementById('shareModal').classList.add('active');
            
            // Generate QR Code (using Google Charts API)
            const qrContainer = document.getElementById('qrCode');
            qrContainer.innerHTML = `<img src="https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=${encodeURIComponent(currentUrl)}&choe=UTF-8" alt="QR Code" style="width: 200px; height: 200px;">`;
        }

        function closeShareModal() {
            document.getElementById('shareModal').classList.remove('active');
        }

        function copyShareLink() {
            const input = document.getElementById('shareLinkInput');
            input.select();
            document.execCommand('copy');
            showToast('تم نسخ الرابط بنجاح', 'success');
        }

        function copyLink() {
            const currentUrl = window.location.href;
            navigator.clipboard.writeText(currentUrl).then(() => {
                showToast('تم نسخ رابط الجهاز', 'success');
            }).catch(() => {
                showToast('فشل نسخ الرابط', 'error');
            });
        }

        // ============================================
        // MAIN INIT
        // ============================================
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const deviceId = urlParams.get('id');

            if (!deviceId) {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'flex';
                return;
            }

            try {
                const device = await fetchDevice(deviceId);
                
                if (!device) {
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('errorState').style.display = 'flex';
                    return;
                }

                deviceData = device;
                
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('contentState').style.display = 'block';
                
                renderAll(device);
            } catch (error) {
                console.error('Init error:', error);
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'flex';
                showToast('حدث خطأ في تحميل البيانات', 'error');
            }
        }

        // Start
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
