<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alion AI | مركز الصيانة الذكي - نظام إدارة متقدم</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #22c55e;
            --dark-bg: #05070c;
            --surface-dark: rgba(10, 14, 23, 0.85);
            --glass-border: rgba(99, 102, 241, 0.2);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --card-bg: rgba(15, 23, 42, 0.6);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Sophisticated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(34, 197, 94, 0.05) 0%, transparent 60%);
            z-index: 0;
        }

        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Glass Panel - Professional */
        .split-layout {
            display: flex;
            width: 1400px;
            max-width: 100%;
            background: var(--surface-dark);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(99, 102, 241, 0.1);
        }

        /* Left Side - Mysterious AI */
        .left-side {
            flex: 1.2;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(0, 0, 0, 0.3) 100%);
            border-left: 1px solid var(--glass-border);
            position: relative;
        }

        .robot-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .robot-svg {
            width: 300px;
            height: 300px;
            margin: 0 auto;
            filter: drop-shadow(0 0 20px var(--primary-glow));
        }

        .robot-name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-top: 1rem;
            color: var(--text-primary);
        }

        .robot-name span {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }

        .typing-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 1.8rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            margin-top: 2rem;
        }

        .typing-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .typing-text i {
            color: var(--primary);
            margin-left: 0.75rem;
        }

        .typing-subtext {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 1rem;
            border-top: 1px solid rgba(99, 102, 241, 0.2);
            padding-top: 1rem;
        }

        /* Right Side - Auth */
        .right-side {
            flex: 0.8;
            background: rgba(5, 7, 12, 0.7);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
        }

        .auth-container {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }

        .auth-header h2 {
            color: var(--text-primary);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .tab-buttons {
            display: flex;
            gap: 0.5rem;
            margin: 1.5rem 0;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.35rem;
            border-radius: 60px;
        }

        .tab-btn {
            flex: 1;
            padding: 0.7rem;
            border: none;
            background: transparent;
            border-radius: 60px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: 'Cairo', sans-serif;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .form-control::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Footer Links - Professional */
        .footer-links {
            margin-top: auto;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            padding-top: 2rem;
            border-top: 1px solid rgba(99, 102, 241, 0.15);
            margin-top: 2rem;
        }

        .footer-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
        }

        .footer-link:hover {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        /* Modal - Professional Clean */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease, visibility 0s linear 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .modal-content {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            max-width: 580px;
            width: 90%;
            border-radius: 24px;
            padding: 0;
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
            direction: rtl;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 1.8rem;
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
        }

        .modal-header h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        .close-modal {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .modal-body {
            padding: 1.8rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .modal-body p {
            margin-bottom: 1rem;
        }

        .modal-footer {
            padding: 1.2rem 1.8rem;
            border-top: 1px solid rgba(99, 102, 241, 0.2);
            display: flex;
            justify-content: flex-end;
        }

        .modal-btn {
            background: var(--primary);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
        }

        .modal-btn:hover {
            background: var(--primary-dark);
        }

        /* Pricing Cards */
        .pricing-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-right: 3px solid var(--primary);
        }

        .pricing-item.highlight {
            border-right-color: var(--accent);
            background: rgba(34, 197, 94, 0.05);
        }

        .price-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .price-amount {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0.5rem 0;
        }

        .annual-offer {
            background: rgba(99, 102, 241, 0.1);
            padding: 0.8rem;
            border-radius: 12px;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .alert {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            margin-bottom: 1.2rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fbbf24;
        }

        @media (max-width: 900px) {
            .split-layout {
                flex-direction: column;
            }
            .left-side {
                padding: 2rem;
                text-align: center;
            }
            .robot-svg {
                width: 220px;
                height: 220px;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="split-layout">
        <!-- Left Side: Mysterious Professional AI -->
        <div class="left-side">
            <div class="robot-container">
                <svg class="robot-svg" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="rgba(99, 102, 241, 0.25)"/>
                            <stop offset="100%" stop-color="rgba(0, 0, 0, 0.6)"/>
                        </linearGradient>
                        <filter id="coreGlow" x="-30%" y="-30%" width="160%" height="160%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                            <feMerge>
                                <feMergeNode in="offsetblur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    
                    <!-- Mysterious Head - Geometric, serious, human-like but enigmatic -->
                    <path d="M150 50 L210 90 L210 170 L150 210 L90 170 L90 90 L150 50Z" 
                          fill="url(#glassGradient)" 
                          stroke="rgba(99, 102, 241, 0.6)" 
                          stroke-width="1.5"
                          filter="url(#coreGlow)"/>
                    
                    <!-- Inner visor / cybernetic interface -->
                    <rect x="125" y="95" width="50" height="55" rx="8" fill="rgba(0,0,0,0.5)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
                    
                    <!-- AI Core - Mysterious pulsing eye (single serious gaze) -->
                    <circle cx="150" cy="122" r="14" fill="rgba(99, 102, 241, 0.2)" stroke="#6366f1" stroke-width="1.5"/>
                    <circle cx="150" cy="122" r="6" fill="#6366f1" filter="url(#coreGlow)">
                        <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    
                    <!-- Geometric patterns - AI matrix style -->
                    <path d="M150 95 L150 75 M135 85 L165 85" stroke="rgba(99,102,241,0.4)" stroke-width="1.2" stroke-dasharray="4 3"/>
                    
                    <!-- Angular jaw / serious expression -->
                    <path d="M125 165 L150 180 L175 165" stroke="rgba(99,102,241,0.6)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
                    
                    <!-- Neural network nodes on head -->
                    <circle cx="115" cy="115" r="3" fill="#6366f1" opacity="0.6"/>
                    <circle cx="185" cy="115" r="3" fill="#6366f1" opacity="0.6"/>
                    <circle cx="100" cy="135" r="2" fill="#22c55e" opacity="0.5"/>
                    <circle cx="200" cy="135" r="2" fill="#22c55e" opacity="0.5"/>
                    
                    <!-- Halo ring - sophisticated tech aura -->
                    <circle cx="150" cy="130" r="68" fill="none" stroke="rgba(99,102,241,0.3)" stroke-width="1" stroke-dasharray="6 4"/>
                    <circle cx="150" cy="130" r="75" fill="none" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
                </svg>
                <div class="robot-name">ALION <span>AI</span></div>
                <div class="tagline">نظام إدارة ذكي | تحكم كامل</div>
            </div>
            
            <div class="typing-container">
                <div class="typing-text">
                    <i class="fas fa-microchip"></i>
                    <span id="typewriter"></span>
                </div>
                <div class="typing-subtext">
                   .. يوفر 80% من وقتك 
                   .. الذكاء الاصطناعي يدير مركز الصيانة نيابة عنك ..
                      ..يحلل . يدير . يحسب . يجرد . ينظم . يغكرك . و ينبهك . يحفزك ..
                </div>
                
            </div>
        </div>
        
        <!-- Right Side: Authentication -->
        <div class="right-side">
            <div class="auth-container">
                <div class="auth-header">
                                    <div class="robot-name">AK <span>Ultra</span></div>

                    <p>نظام متكامل يعمل بالذكاء الاصطناعي</p>
                </div>
                
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
                    <button class="tab-btn" onclick="switchTab('register')">حساب جديد</button>
                </div>
                
                <div id="alertMessage" style="display:none"></div>
                
                <!-- Login Form -->
                <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> اسم المستخدم</label>
                        <input type="text" class="form-control" id="loginUsername" placeholder="اسم المستخدم" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> كلمة المرور</label>
                        <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn" id="loginBtn">
                        <span>الدخول إلى النظام</span>
                        <i class="fas fa-arrow-left"></i>
                    </button>
                </form>
                
                <!-- Register Form -->
                <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> اسم المستخدم</label>
                        <input type="text" class="form-control" id="regUsername" placeholder="اختر اسم مستخدم" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="example@domain.com" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> كلمة المرور</label>
                        <input type="password" class="form-control" id="regPassword" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-check-circle"></i> تأكيد كلمة المرور</label>
                        <input type="password" class="form-control" id="regConfirmPassword" placeholder="أعد إدخال كلمة المرور" required>
                    </div>
                    <button type="submit" class="btn" id="registerBtn">
                        <span>إنشاء حساب جديد</span>
                        <i class="fas fa-user-plus"></i>
                    </button>
                </form>
            </div>
            
            <!-- Professional Footer Links -->
            <div class="footer-links">
                <a class="footer-link" data-modal="about">من نحن</a>
                <a class="footer-link" data-modal="developer">المطور</a>
                <a class="footer-link" data-modal="privacy">الخصوصية</a>
                <a class="footer-link" data-modal="pricing">الخطط & الأسعار</a>
            </div>
        </div>
    </div>
</div>

<!-- Modal Component -->
<div id="globalModal" class="modal-overlay">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
    // Configuration
    const API_URL = "https://script.google.com/macros/s/AKfycbwxIqWejVb9ZRVV4m8BS55dxpNK9IyKn7AYKIkTC4ppHHVonRBbONBRLd-mjGorAzRF5Q/exec";
    
    // Professional typing - serious AI messages
    const messages = [
        "   مش مجرد سيستم ده عينك علي مكانك  ",
        "ذكاء اصتناعي يوفر 40% من وقتك يدير و يحسب و يفتكر و يفكرك بكل حاجة    ",
        "إدارة كاملة من اي مكان  ",
        "نظام تشغيل متكامل بالذكاء الاصطناعي"
    ];
    let msgIndex = 0, charIndex = 0, isDeleting = false;
    const typeEl = document.getElementById('typewriter');
    
    function typeEffect() {
        const current = messages[msgIndex];
        if (isDeleting) {
            charIndex--;
        } else {
            charIndex++;
        }
        typeEl.textContent = current.substring(0, charIndex);
        
        if (!isDeleting && charIndex === current.length) {
            isDeleting = true;
            setTimeout(typeEffect, 2500);
        } else if (isDeleting && charIndex === 0) {
            isDeleting = false;
            msgIndex = (msgIndex + 1) % messages.length;
            setTimeout(typeEffect, 400);
        } else {
            setTimeout(typeEffect, isDeleting ? 40 : 70);
        }
    }
    setTimeout(typeEffect, 800);
    
    // ========== MODAL SYSTEM - NO CLOSE ANIMATION, INSTANT ==========
    const modalOverlay = document.getElementById('globalModal');
    const modalContent = document.getElementById('modalContent');
    
    function openModal(html) {
        modalContent.innerHTML = html;
        modalOverlay.classList.add('active');
        // Attach close handlers
        const closeBtn = modalContent.querySelector('.close-modal');
        if (closeBtn) closeBtn.onclick = closeModal;
        const modalBtn = modalContent.querySelector('.modal-btn');
        if (modalBtn) modalBtn.onclick = closeModal;
        // Close on overlay click
        modalOverlay.onclick = function(e) {
            if (e.target === modalOverlay) closeModal();
        };
    }
    
    function closeModal() {
        modalOverlay.classList.remove('active');
    }
    
    // Modal Content Builder
    const modalTemplates = {
        about: `
            <div class="modal-header">
                <h3><i class="fas fa-brain"></i> من نحن</h3>
                <button class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <p><strong> احنا AK Project و</strong>  في AK Ultra لا نقدم مجرد نظام لإدارة الصيانة… بل نعيد تعريف الطريقة التي تُدار بها عمليات الصيانة بالكامل.</p>
                <p>انطلقنا برؤية واضحة: تحويل التعقيد اليومي في إدارة الأجهزة والأعطال إلى تجربة سلسة، ذكية، وقابلة للتحكم الكامل. لذلك قمنا ببناء منصة متكاملة تجمع بين الدقة التقنية وسهولة الاستخدام، لتمنحك سيطرة حقيقية على كل تفصيلة داخل منظومة العمل.</p>
                <p><i class="" style="color: #6366f1;"></i>نعمل على تمكين مراكز الصيانة والفنيين من:

تتبع الأجهزة في كل مرحلة بدقة لحظية
إدارة فرق العمل بكفاءة عالية

    // Attach modal triggers
    document.querySelectorAll('.footer-link').forEach(link => {
        link.addEventListener('click', (e) => {
            const modalKey = link.getAttribute('data-modal');
            if (modalTemplates[modalKey]) {
                openModal(modalTemplates[modalKey]);
            }
        });
    });
    
    // ========== AUTH FUNCTIONS ==========
    function showAlert(message, type) {
        const alertDiv = document.getElementById("alertMessage");
        alertDiv.style.display = "block";
        alertDiv.className = `alert alert-${type}`;
        alertDiv.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : type === 'success' ? 'check-circle' : 'info-circle'}"></i> ${message}`;
        setTimeout(() => { alertDiv.style.display = "none"; }, 4000);
    }
    
    function hideAlert() {
        document.getElementById("alertMessage").style.display = "none";
    }
    
    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation: spin 0.6s linear infinite;"></span> جاري ...';
        } else {
            if (btnId === 'loginBtn') btn.innerHTML = '<span>الدخول إلى النظام</span> <i class="fas fa-arrow-left"></i>';
            else btn.innerHTML = '<span>إنشاء حساب جديد</span> <i class="fas fa-user-plus"></i>';
            btn.disabled = false;
        }
    }
    
    window.switchTab = function(tab) {
        const btns = document.querySelectorAll(".tab-btn");
        const loginForm = document.getElementById("loginForm");
        const regForm = document.getElementById("registerForm");
        
        btns.forEach((btn, idx) => {
            if ((tab === 'login' && idx === 0) || (tab === 'register' && idx === 1)) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
        
        if (tab === 'login') {
            loginForm.classList.add("active");
            regForm.classList.remove("active");
        } else {
            regForm.classList.add("active");
            loginForm.classList.remove("active");
        }
        hideAlert();
    };
    
    async function handleLogin(event) {
        event.preventDefault();
        hideAlert();
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;
        if (!username || !password) {
            showAlert("يرجى إدخال اسم المستخدم وكلمة المرور", "error");
            return;
        }
        setLoading("loginBtn", true);
        try {
            const params = new URLSearchParams();
            params.append("action", "login");
            params.append("username", username);
            params.append("password", password);
            const response = await fetch(API_URL, { method: "POST", body: params });
            const data = await response.json();
            if (!data.success) {
                showAlert(data.message || "بيانات الدخول غير صحيحة", "error");
                return;
            }
            if (data.status && data.status !== "approved") {
                showAlert("الحساب قيد المراجعة من قبل الإدارة", "warning");
                return;
            }
            showAlert("تم تسجيل الدخول بنجاح - جاري التوجيه", "success");
            sessionStorage.setItem("currentUser", username);
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);
        } catch (error) {
            showAlert("خطأ في الاتصال بالخادم", "error");
        } finally {
            setLoading("loginBtn", false);
        }
    }
    
    async function handleRegister(event) {
        event.preventDefault();
        hideAlert();
        const username = document.getElementById("regUsername").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;
        const confirm = document.getElementById("regConfirmPassword").value;
        
        if (!username || !email || !password) {
            showAlert("جميع الحقول مطلوبة", "error");
            return;
        }
        if (password !== confirm) {
            showAlert("كلمة المرور غير متطابقة", "error");
            return;
        }
        setLoading("registerBtn", true);
        try {
            const params = new URLSearchParams();
            params.append("action", "register");
            params.append("username", username);
            params.append("email", email);
            params.append("password", password);
            await fetch(API_URL, { method: "POST", body: params });
            showAlert("تم إنشاء الحساب بنجاح! سيتم مراجعته من قبل الإدارة.", "success");
            document.getElementById("registerForm").reset();
            setTimeout(() => switchTab("login"), 2500);
        } catch (error) {
            showAlert("خطأ في الاتصال بالخادم", "error");
        } finally {
            setLoading("registerBtn", false);
        }
    }
    
    // Session check
    if (sessionStorage.getItem("currentUser")) {
        window.location.href = "dashboard.html";
    }
    
    // Add spin keyframes
    const style = document.createElement('style');
    style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
    document.head.appendChild(style);
</script>
