<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AK Ultra - إدارة المخزن</title>
    
    <!-- Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --secondary: #7c3aed;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --background: var(--gray-50);
            --surface: #ffffff;
            --surface-hover: var(--gray-100);
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-700);
            --text-muted: var(--gray-500);
            --border-light: var(--gray-200);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 9999px;
            --font-size-xs: 0.75rem;
            --font-size-sm: 0.875rem;
            --font-size-base: 1rem;
            --font-size-lg: 1.125rem;
            --font-size-xl: 1.375rem;
            --font-size-2xl: 1.75rem;
        }
        
        [data-theme="dark"] {
            --background: var(--gray-900);
            --surface: var(--gray-800);
            --surface-hover: var(--gray-700);
            --text-primary: var(--gray-50);
            --text-secondary: var(--gray-300);
            --text-muted: var(--gray-400);
            --border-light: var(--gray-700);
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            transition: background-color var(--transition-base);
            font-size: var(--font-size-sm);
        }
        
        .app-container { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-left: 1px solid var(--border-light);
            padding: 1.5rem;
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            overflow-y: auto;
            transition: transform var(--transition-base);
            z-index: 50;
            box-shadow: var(--shadow-lg);
        }
        
        .sidebar.collapsed { transform: translateX(280px); }
        
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
        }
        
        .logo-text h2 { font-size: var(--font-size-lg); font-weight: 700; color: var(--text-primary); }
        .logo-text p { font-size: var(--font-size-xs); color: var(--text-muted); }
        
        .nav-menu { list-style: none; }
        .nav-item { margin-bottom: 0.5rem; }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            font-weight: 500;
        }
        
        .nav-link i { width: 20px; font-size: 1.1rem; }
        .nav-link:hover { background: var(--surface-hover); color: var(--primary); }
        .nav-link.active { background: var(--primary); color: white; }
        
        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 1.5rem;
            transition: margin-right var(--transition-base);
        }
        
        .main-content.expanded { margin-right: 0; }
        
        .top-bar {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }
        
        .menu-toggle { display: none; background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; }
        .page-title { font-size: var(--font-size-xl); font-weight: 700; color: var(--text-primary); }
        
        .top-bar-actions { display: flex; align-items: center; gap: 1rem; }
        
        .theme-toggle {
            background: var(--surface-hover);
            border: none;
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: var(--font-size-sm);
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: 'Cairo', sans-serif;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #0d9488; transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; transform: translateY(-1px); }
        .btn-secondary { background: var(--surface-hover); color: var(--text-primary); border: 1px solid var(--border-light); }
        
        .section-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            margin-bottom: 1.5rem;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .section-title { font-size: var(--font-size-lg); font-weight: 700; color: var(--text-primary); }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-secondary); font-size: var(--font-size-sm); }
        
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            background: var(--surface);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            font-size: var(--font-size-sm);
            transition: all var(--transition-fast);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        select.form-control { cursor: pointer; }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 1rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            text-align: center;
        }
        
        .stat-value { font-size: var(--font-size-2xl); font-weight: 700; color: var(--primary); }
        .stat-label { font-size: var(--font-size-xs); color: var(--text-muted); }
        
        .filters-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--surface-hover);
            padding: 0.25rem;
            border-radius: var(--radius-md);
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: none;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            font-size: var(--font-size-xs);
        }
        
        .filter-btn.active { background: var(--primary); color: white; }
        
        .search-box {
            position: relative;
            flex: 1;
            min-width: 200px;
        }
        
        .search-box i {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        .search-box input {
            padding-right: 2.5rem;
            width: 100%;
        }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        
        .stock-card {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 1.2rem;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
            position: relative;
        }
        
        .stock-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
        }
        
        .stock-card.sold {
            opacity: 0.8;
            border-right: 4px solid var(--success);
        }
        
        .stock-card .badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: 500;
        }
        
        .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .badge-info { background: rgba(59, 130, 246, 0.1); color: var(--info); }
        
        .stock-card h4 { font-size: var(--font-size-lg); font-weight: 700; margin-bottom: 0.5rem; color: var(--text-primary); }
        .stock-card p { font-size: var(--font-size-sm); color: var(--text-secondary); margin-bottom: 0.25rem; }
        
        .profit-positive { color: var(--success); font-weight: 600; }
        .profit-negative { color: var(--danger); font-weight: 600; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: var(--surface);
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--surface);
        }
        
        .modal-title { font-size: var(--font-size-lg); font-weight: 700; color: var(--text-primary); }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: var(--radius-full);
        }
        
        .modal-body { padding: 1.5rem; }
        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
        
        .profit-preview {
            background: var(--surface-hover);
            padding: 1rem;
            border-radius: var(--radius-lg);
            text-align: center;
            margin-top: 1rem;
            font-size: var(--font-size-lg);
            font-weight: 600;
        }
        
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .toast {
            min-width: 280px;
            padding: 12px 20px;
            background: var(--surface);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border-right: 4px solid var(--primary);
            animation: toastSlideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toast.success { border-right-color: var(--success); }
        .toast.error { border-right-color: var(--danger); }
        
        @keyframes toastSlideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        .loading-overlay.active { display: flex; }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--surface);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(280px); z-index: 100; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-right: 0; }
            .menu-toggle { display: block; }
            .items-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-tools"></i></div>
                    <div class="logo-text"><h2>AK Ultra</h2><p>مركز جيمي</p></div>
                </div>
                <button class="theme-toggle" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-chart-pie"></i><span>لوحة التحكم</span></a></li>
                <li class="nav-item"><a href="dashboard.html#devices" class="nav-link"><i class="fas fa-mobile-alt"></i><span>الأجهزة</span></a></li>
                <li class="nav-item"><a href="stock.html" class="nav-link active"><i class="fas fa-boxes"></i><span>المخزن</span></a></li>
                <li class="nav-item"><a href="dashboard.html#technicians" class="nav-link"><i class="fas fa-users"></i><span>الفنيين</span></a></li>
                <li class="nav-item"><a href="dashboard.html#profits" class="nav-link"><i class="fas fa-chart-line"></i><span>الأرباح</span></a></li>
                <li class="nav-item"><a href="dashboard.html#alion" class="nav-link"><i class="fas fa-robot"></i><span>Alion</span></a></li>
            </ul>
            <div style="margin-top: auto; padding-top: 2rem;">
                <div class="user-menu" style="display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 1rem; background: var(--surface-hover); border-radius: var(--radius-full);">
                    <div class="user-avatar" id="userAvatar" style="width: 32px; height: 32px; background: var(--primary); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;"></div>
                    <div class="user-info">
                        <div class="user-name" id="userNameDisplay"></div>
                        <div class="user-role">المستخدم الحالي</div>
                    </div>
                </div>
            </div>
            <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-light); text-align: center;">
                <p style="font-size: var(--font-size-xs); color: var(--text-muted); margin-bottom: 0.5rem;">تم التطوير بواسطة</p>
                <a href="https://www.facebook.com/ali.khaled.244644" target="_blank" style="display: inline-flex; align-items: center; gap: 0.5rem; color: var(--primary); text-decoration: none; font-weight: 600; font-size: var(--font-size-sm);">
                    <i class="fab fa-facebook" style="font-size: 1.2rem;"></i>
                    ALI KHALED
                </a>
                <p style="font-size: var(--font-size-xs); color: var(--text-muted); margin-top: 0.5rem;">© 2026 جميع الحقوق محفوظة</p>
            </div>
        </aside>
        
        <main class="main-content" id="mainContent">
            <div class="top-bar">
                <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h1 class="page-title">📦 إدارة المخزن</h1>
                <div class="top-bar-actions">
                    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <button class="btn btn-primary" onclick="openAddItemModal()"><i class="fas fa-plus"></i> إضافة قطعة</button>
                    <button class="btn btn-danger" onclick="openSellModal()"><i class="fas fa-tag"></i> بيع قطعة</button>
                </div>
            </div>
            
            <div id="pageContainer">
                <!-- Stats Cards -->
                <div class="stats-grid" id="statsContainer"></div>
                
                <!-- Filters -->
                <div class="section-card">
                    <div class="filters-bar">
                        <div class="filter-group">
                            <button class="filter-btn active" data-filter="all" onclick="setCategoryFilter('all')">الكل</button>
                            <button class="filter-btn" data-filter="بطاريات" onclick="setCategoryFilter('بطاريات')">بطاريات</button>
                            <button class="filter-btn" data-filter="صوتيات" onclick="setCategoryFilter('صوتيات')">صوتيات</button>
                            <button class="filter-btn" data-filter="شاشات" onclick="setCategoryFilter('شاشات')">شاشات</button>
                            <button class="filter-btn" data-filter="هوسنجات" onclick="setCategoryFilter('هوسنجات')">هوسنجات</button>
                            <button class="filter-btn" data-filter="فريمات" onclick="setCategoryFilter('فريمات')">فريمات</button>
                            <button class="filter-btn" data-filter="كاميرات" onclick="setCategoryFilter('كاميرات')">كاميرات</button>
                            <button class="filter-btn" data-filter="فلاتات" onclick="setCategoryFilter('فلاتات')">فلاتات</button>
                        </div>
                        <div class="filter-group">
                            <button class="filter-btn" data-status="all" onclick="setStatusFilter('all')">الكل</button>
                            <button class="filter-btn" data-status="In Stock" onclick="setStatusFilter('In Stock')">متوفر</button>
                            <button class="filter-btn" data-status="Sold" onclick="setStatusFilter('Sold')">مباع</button>
                        </div>
                        
                        <button class="btn btn-secondary btn-sm" onclick="refreshData()"><i class="fas fa-sync-alt"></i> تحديث</button>
                    </div>
                    
                    <div class="items-grid" id="itemsGrid">
                        <div class="empty-state">جاري التحميل...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Add Item Modal -->
    <div class="modal" id="addItemModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-plus"></i> إضافة قطعة جديدة</h3>
                <button class="modal-close" onclick="closeModal('addItemModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="addItemForm" onsubmit="submitAddItem(event)">
                    <div class="form-group">
                        <label class="form-label">القسم *</label>
                        <select class="form-control" id="itemCategory" required>
                            <option value="">اختر القسم</option>
                            <option value="بطاريات">🔋 بطاريات</option>
                            <option value="صوتيات">🎵 صوتيات</option>
                            <option value="شاشات">📱 شاشات</option>
                            <option value="هوسنجات">📱 هوسنجات</option>
                            <option value="فريمات">🖼️ فريمات</option>
                            <option value="كاميرات">📷 كاميرات</option>
                            <option value="فلاتات">⚡ فلاتات</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">نوع القطعة *</label>
                        <input type="text" class="form-control" id="itemType" required placeholder="مثال: ليثيوم, شاحن, سماعة...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">اسم القطعة *</label>
                        <input type="text" class="form-control" id="itemName" required placeholder="الاسم الكامل للقطعة">
                    </div>
                    <div class="form-group">
                        <label class="form-label">سعر الشراء (السعر الفعلي) *</label>
                        <input type="number" class="form-control" id="itemCostPrice" required min="0" step="0.01" placeholder="مثال: 50.00">
                    </div>
                    <div class="modal-footer" style="padding: 1rem 0 0 0;">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> إضافة القطعة</button>
                        <button type="button" class="btn btn-secondary" onclick="closeModal('addItemModal')">إلغاء</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Sell Item Modal -->
    <div class="modal" id="sellModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-tag"></i> بيع قطعة</h3>
                <button class="modal-close" onclick="closeModal('sellModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="sellForm" onsubmit="submitSell(event)">
                    <div class="form-group">
                        <label class="form-label">اختر القطعة *</label>
                        <select class="form-control" id="sellItemId" required onchange="updateProfitPreview()">
                            <option value="">اختر قطعة من المخزن</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">اسم العميل *</label>
                        <input type="text" class="form-control" id="customerName" required placeholder="أدخل اسم العميل">
                    </div>
                    <div class="form-group">
                        <label class="form-label">سعر البيع *</label>
                        <input type="number" class="form-control" id="sellPrice" required min="0" step="0.01" placeholder="أدخل سعر البيع" oninput="updateProfitPreview()">
                    </div>
                    <div class="profit-preview" id="profitPreview">
                        سعر الشراء: -- | الربح: --
                    </div>
                    <div class="modal-footer" style="padding: 1rem 0 0 0;">
                        <button type="submit" class="btn btn-success"><i class="fas fa-check"></i> تأكيد البيع</button>
                        <button type="button" class="btn btn-secondary" onclick="closeModal('sellModal')">إلغاء</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const STOCK_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4WGJxVYyhKV6kV6YuTrrDfd4tB6QhcvbUqfENiFnGAvwtTcgPboSJIGKBYvfnaDD-/exec'; // ⚠️ استبدل هذا برابط النشر الفعلي من Google Apps Script
        
        let stockItems = [];
        let currentCategoryFilter = 'all';
        let currentStatusFilter = 'all';
        let currentSearchQuery = '';
        
        // ============================================
        // SESSION MANAGEMENT
        // ============================================
        function getCurrentUser() {
            let user = localStorage.getItem('currentUser');
            if (!user) {
                user = prompt('الرجاء إدخال اسمك:', 'فني');
                if (!user) user = 'فني';
                localStorage.setItem('currentUser', user);
            }
            return user;
        }
        
        function updateUserDisplay() {
            const user = getCurrentUser();
            document.getElementById('userNameDisplay').textContent = user;
            document.getElementById('userAvatar').textContent = user.charAt(0);
        }
        
        // ============================================
        // UI HELPERS
        // ============================================
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('active');
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = document.createElement('i');
            icon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            const text = document.createElement('span');
            text.textContent = message;
            toast.appendChild(icon);
            toast.appendChild(text);
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'toastSlideIn 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('mainContent').classList.toggle('expanded');
        }
        
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            const icon = document.querySelector('#themeToggle i');
            if (icon) icon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', newTheme);
        }
        
        function checkTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
                const icon = document.querySelector('#themeToggle i');
                if (icon) icon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
        }
        
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'غير محدد';
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric' });
        }
        
        // ============================================
        // API CALLS
        // ============================================
        async function callApi(action, payload = {}) {
            if (!STOCK_SCRIPT_URL) {
                showToast('⚠️ لم يتم إعداد رابط Google Apps Script', 'error');
                throw new Error('STOCK_SCRIPT_URL not configured');
            }
            
            try {
                const formData = new FormData();
                formData.append('action', action);
                formData.append('payload', JSON.stringify(payload));
                
                const response = await fetch(STOCK_SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (!data.success) throw new Error(data.error || 'فشل العملية');
                return data;
            } catch (error) {
                console.error('API Error:', error);
                showToast(error.message || 'حدث خطأ في الاتصال', 'error');
                throw error;
            }
        }
        
        // ============================================
        // CORE FUNCTIONS
        // ============================================
        async function loadStockItems() {
            showLoading();
            try {
                const result = await callApi('getItems');
                if (result.success && result.data) {
                    stockItems = result.data;
                    renderStats();
                    renderItems();
                } else {
                    stockItems = [];
                    renderItems();
                }
            } catch (error) {
                console.error('Error loading items:', error);
                stockItems = [];
                renderItems();
            } finally {
                hideLoading();
            }
        }
        
        function refreshData() {
            loadStockItems();
        }
        
        function renderStats() {
            const totalItems = stockItems.length;
            const inStock = stockItems.filter(i => i.Status !== 'Sold').length;
            const sold = stockItems.filter(i => i.Status === 'Sold').length;
            const totalProfit = stockItems.reduce((sum, i) => sum + (parseFloat(i.Profit) || 0), 0);
            
            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalItems}</div>
                    <div class="stat-label">إجمالي القطع</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--success);">${inStock}</div>
                    <div class="stat-label">متوفر</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--warning);">${sold}</div>
                    <div class="stat-label">مباع</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--primary);">${totalProfit.toFixed(2)} جنيه</div>
                    <div class="stat-label">إجمالي الأرباح</div>
                </div>
            `;
        }
        
        function filterItems() {
            let filtered = [...stockItems];
            
            if (currentCategoryFilter !== 'all') {
                filtered = filtered.filter(i => i.Category === currentCategoryFilter);
            }
            
            if (currentStatusFilter !== 'all') {
                filtered = filtered.filter(i => i.Status === currentStatusFilter);
            }
            
            if (currentSearchQuery) {
                const query = currentSearchQuery.toLowerCase();
                filtered = filtered.filter(i => 
                    (i.Name && i.Name.toLowerCase().includes(query)) ||
                    (i.Type && i.Type.toLowerCase().includes(query)) ||
                    (i.CustomerName && i.CustomerName.toLowerCase().includes(query))
                );
            }
            
            return filtered;
        }
        
        function renderItems() {
            const filtered = filterItems();
            const grid = document.getElementById('itemsGrid');
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">📭 لا توجد قطع لعرضها</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(item => `
                <div class="stock-card ${item.Status === 'Sold' ? 'sold' : ''}">
                    <span class="badge ${item.Status === 'Sold' ? 'badge-success' : 'badge-warning'}">
                        ${item.Status === 'Sold' ? '✅ مباع' : '📦 متوفر'}
                    </span>
                    <h4>${escapeHtml(item.Name || 'غير محدد')}</h4>
                    <p><i class="fas fa-tag"></i> <strong>القسم:</strong> ${item.Category || 'غير محدد'}</p>
                    <p><i class="fas fa-microchip"></i> <strong>النوع:</strong> ${item.Type || 'غير محدد'}</p>
                    ${item.Status === 'Sold' ? `
                        <p><i class="fas fa-user"></i> <strong>العميل:</strong> ${escapeHtml(item.CustomerName || 'غير محدد')}</p>
                        <p><i class="fas fa-dollar-sign"></i> <strong>سعر الشراء:</strong> ${parseFloat(item.CostPrice).toFixed(2)} جنيه</p>
                        <p><i class="fas fa-money-bill-wave"></i> <strong>سعر البيع:</strong> ${parseFloat(item.SellPrice).toFixed(2)} جنيه</p>
                        <p class="${parseFloat(item.Profit) >= 0 ? 'profit-positive' : 'profit-negative'}">
                            <i class="fas fa-chart-line"></i> <strong>الربح:</strong> ${parseFloat(item.Profit).toFixed(2)} جنيه
                        </p>
                        <p><i class="fas fa-calendar"></i> <strong>تاريخ البيع:</strong> ${formatDate(item.Date)}</p>
                    ` : `
                        <p><i class="fas fa-dollar-sign"></i> <strong>سعر الشراء:</strong> ${parseFloat(item.CostPrice).toFixed(2)} جنيه</p>
                        <button class="btn btn-success btn-sm" style="margin-top: 0.5rem; width: 100%;" onclick="openSellWithItem('${item.ID}')">
                            <i class="fas fa-tag"></i> بيع هذه القطعة
                        </button>
                    `}
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============================================
        // FILTERS
        // ============================================
        function setCategoryFilter(category) {
            currentCategoryFilter = category;
            document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
                if (btn.getAttribute('data-filter') === category) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderItems();
        }
        
        function setStatusFilter(status) {
            currentStatusFilter = status;
            document.querySelectorAll('.filter-btn[data-status]').forEach(btn => {
                if (btn.getAttribute('data-status') === status) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderItems();
        }
        
        function handleSearch() {
            currentSearchQuery = document.getElementById('searchInput').value;
            renderItems();
        }
        
        // ============================================
        // ADD ITEM
        // ============================================
        function openAddItemModal() {
            document.getElementById('addItemForm').reset();
            openModal('addItemModal');
        }
        
        async function submitAddItem(event) {
            event.preventDefault();
            showLoading();
            
            const itemData = {
                category: document.getElementById('itemCategory').value,
                type: document.getElementById('itemType').value,
                name: document.getElementById('itemName').value,
                costPrice: parseFloat(document.getElementById('itemCostPrice').value)
            };
            
            if (!itemData.category || !itemData.type || !itemData.name || !itemData.costPrice) {
                showToast('الرجاء ملء جميع الحقول المطلوبة', 'error');
                hideLoading();
                return;
            }
            
            try {
                const result = await callApi('addItem', itemData);
                if (result.success) {
                    showToast('تم إضافة القطعة بنجاح');
                    closeModal('addItemModal');
                    await loadStockItems();
                }
            } catch (error) {
                console.error('Error adding item:', error);
            } finally {
                hideLoading();
            }
        }
        
        // ============================================
        // SELL ITEM
        // ============================================
        function openSellModal() {
            const inStockItems = stockItems.filter(i => i.Status !== 'Sold');
            const select = document.getElementById('sellItemId');
            select.innerHTML = '<option value="">اختر قطعة من المخزن</option>';
            
            if (inStockItems.length === 0) {
                select.innerHTML = '<option value="">لا توجد قطع متوفرة للبيع</option>';
                showToast('لا توجد قطع متوفرة للبيع حالياً', 'warning');
            } else {
                inStockItems.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.ID;
                    option.textContent = `${item.Name} - ${item.Type} (سعر الشراء: ${parseFloat(item.CostPrice).toFixed(2)} جنيه)`;
                    select.appendChild(option);
                });
            }
            
            document.getElementById('sellForm').reset();
            document.getElementById('profitPreview').innerHTML = 'سعر الشراء: -- | الربح: --';
            openModal('sellModal');
        }
        
        function openSellWithItem(itemId) {
            openSellModal();
            setTimeout(() => {
                const select = document.getElementById('sellItemId');
                if (select) {
                    select.value = itemId;
                    updateProfitPreview();
                }
            }, 100);
        }
        
        function updateProfitPreview() {
            const itemId = document.getElementById('sellItemId').value;
            const sellPrice = parseFloat(document.getElementById('sellPrice').value);
            
            if (!itemId) {
                document.getElementById('profitPreview').innerHTML = 'سعر الشراء: -- | الربح: --';
                return;
            }
            
            const item = stockItems.find(i => i.ID === itemId);
            if (!item) return;
            
            const costPrice = parseFloat(item.CostPrice);
            const profit = !isNaN(sellPrice) ? sellPrice - costPrice : 0;
            const profitClass = profit >= 0 ? 'profit-positive' : 'profit-negative';
            
            document.getElementById('profitPreview').innerHTML = `
                <strong>سعر الشراء:</strong> ${costPrice.toFixed(2)} جنيه<br>
                <strong class="${profitClass}">الربح: ${profit.toFixed(2)} جنيه</strong>
            `;
        }
        
        async function submitSell(event) {
            event.preventDefault();
            showLoading();
            
            const itemId = document.getElementById('sellItemId').value;
            const customerName = document.getElementById('customerName').value;
            const sellPrice = parseFloat(document.getElementById('sellPrice').value);
            
            if (!itemId || !customerName || isNaN(sellPrice)) {
                showToast('الرجاء ملء جميع الحقول المطلوبة', 'error');
                hideLoading();
                return;
            }
            
            const item = stockItems.find(i => i.ID === itemId);
            if (!item) {
                showToast('القطعة غير موجودة', 'error');
                hideLoading();
                return;
            }
            
            const sellData = {
                id: itemId,
                customerName: customerName,
                sellPrice: sellPrice,
                costPrice: parseFloat(item.CostPrice)
            };
            
            try {
                const result = await callApi('sellItem', sellData);
                if (result.success) {
                    showToast(`تم بيع القطعة بنجاح! الربح: ${(sellPrice - parseFloat(item.CostPrice)).toFixed(2)} جنيه`);
                    closeModal('sellModal');
                    await loadStockItems();
                }
            } catch (error) {
                console.error('Error selling item:', error);
            } finally {
                hideLoading();
            }
        }
        
        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            updateUserDisplay();
            checkTheme();
            loadStockItems();
        });
    </script>
</body>
</html>
